services:
  postgres:
    image: postgres:17-alpine
    container_name: vaxis-postgres
    environment:
      POSTGRES_DB: vaxis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vaxis"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: vaxis-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: vaxis-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  web:
    build: ./apps/web
    container_name: vaxis-web
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/vaxis
      - REDIS_URL=redis://redis:6379
